<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Welcome to HOBY NY East</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        :root {
            --primary: #0055A4;
            --accent: #FFD700;
            --bg: #f8f9fa;
            --text: #212529;
            --border-radius: 8px;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 1rem;
            text-align: center;
        }
        .form-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
        img.logo {
            max-width: 150px;
            margin-bottom: 1rem;
        }
        h2 {
            color: var(--primary);
            font-size: 1.5rem;
        }
        label {
            font-weight: 600;
            display: block;
            margin-top: 1rem;
            text-align: left;
        }
        input[type="text"],
        textarea {
            width: 100%;
            padding: 0.6rem;
            margin-top: 0.5rem;
            border: 1px solid #ccc;
            border-radius: var(--border-radius);
            font-size: 1rem;
            box-sizing: border-box;
        }
        input[type="radio"] {
            margin-right: 0.5rem;
        }
        .hidden { display: none; }
        button {
            background-color: var(--primary);
            color: white;
            padding: 0.75rem 1rem;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            margin-top: 1rem;
            width: 100%;
            max-width: 300px;
        }
        .small-button {
            font-size: 0.85rem;
            padding: 0.5rem;
            max-width: 200px;
        }
        .lunch-label {
            text-align: left;
            margin-top: 1rem;
            display: block;
        }
        .lunch-description {
            font-weight: normal;
            font-size: 0.9rem;
            color: #555;
            margin-left: 1.5rem;
        }
        .allergen-icon {
            display: inline-block;
            background-color: #eee;
            color: #333;
            font-size: 0.75rem;
            border-radius: 4px;
            padding: 2px 6px;
            margin: 2px 4px 2px 0;
        }
        .suggestions-list {
            list-style: none;
            padding: 0;
            margin: 0.5rem 0 0;
            border: 1px solid #ccc;
            border-radius: var(--border-radius);
            max-height: 200px;
            overflow-y: auto;
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            text-align: left;
        }
        .suggestions-list li {
            padding: 0.5rem;
            cursor: pointer;
        }
        .suggestions-list li:hover {
            background-color: #f0f0f0;
        }
        .divider {
            margin: 2rem 0;
            border-top: 1px solid #ccc;
        }
        .progress-bar {
            width: 100%;
            background-color: #ddd;
            border-radius: var(--border-radius);
            overflow: hidden;
            margin-top: 1rem;
        }
        .progress-fill {
            height: 10px;
            background-color: var(--primary);
            width: 0%;
            transition: width 1s linear;
        }
        @media (max-width: 480px) {
            body { padding: 0.5rem; }
            h2 { font-size: 1.2rem; }
            .form-container { padding: 1rem; }
            button { font-size: 0.95rem; padding: 0.6rem; }
        }
    </style>
</head>
<body>
<div class="form-container">
    <img src="hoby-logo.png" alt="HOBY NY East logo" class="logo" />
    <h2>Welcome to HOBY NY East</h2>

    <input type="text" id="searchInput" placeholder="Start typing your name..." autocomplete="off" />
    <ul id="suggestions" class="suggestions-list hidden"></ul>

    <div id="nameConfirmSection" class="hidden">
        <p id="confirmText"></p>
        <button onclick="handleNameConfirmation(true)">Yes, that's me</button>
        <button onclick="handleNameConfirmation(false)">No, go back</button>
    </div>

    <div id="confirmationSection" class="hidden">
        <p>You will be redirected in <span id="countdown">5</span> seconds...</p>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

</div>

<script>
    const searchInput = document.getElementById("searchInput");
    const suggestions = document.getElementById("suggestions");
    const nameConfirmSection = document.getElementById("nameConfirmSection");
    const confirmText = document.getElementById("confirmText");
    const confirmationSection = document.getElementById("confirmationSection");
    const confirmedNameEl = document.getElementById("confirmedName");
    const countdownEl = document.getElementById("countdown");
    const progressFill = document.getElementById("progressFill");
    let otherDiet = null;

    let formEntries = [];
    let formMap = {};
    let selectedName = "";

    fetch("https://script.google.com/macros/s/AKfycby-3MzAohYE6eIVJ4x1D9eJGMLkRbmEFqWIG8bzADEYvlZ8Yi7Y4mUR774mQPQ0Zvo/exec")
        .then(response => response.text())
        .then(text => {
            const rows = text.trim().split("\n");
            for (let i = 1; i < rows.length; i++) {
                const [label, url] = rows[i].split("\t");
                if (!label || !url) continue;
                formEntries.push({ label, url });
                formMap[label] = url;
            }
            formEntries.sort((a, b) => {
                const aLast = a.label.trim().split(" ").slice(-1)[0].toLowerCase();
                const bLast = b.label.trim().split(" ").slice(-1)[0].toLowerCase();
                return aLast.localeCompare(bLast);
            });
        });

    searchInput.addEventListener("input", () => {
        const search = searchInput.value.toLowerCase();
        const matches = formEntries.filter(entry =>
            entry.label.toLowerCase().includes(search)
        );
        suggestions.innerHTML = "";
        suggestions.classList.toggle("hidden", matches.length === 0);
        matches.forEach(entry => {
            const li = document.createElement("li");
            li.textContent = entry.label;
            li.onclick = () => selectName(entry.label);
            suggestions.appendChild(li);
        });
    });

    function selectName(name) {
        selectedName = name;
        searchInput.value = name;
        suggestions.classList.add("hidden");
        confirmText.textContent = `Are you ${name}?`;
        nameConfirmSection.classList.remove("hidden");
    }

    function handleNameConfirmation(confirmed) {
        if (confirmed) {
            nameConfirmSection.classList.add("hidden");
            confirmationSection.classList.remove("hidden");

            let seconds = 5;
            progressFill.style.width = "0%";
            const interval = setInterval(() => {
                seconds--;
                countdownEl.textContent = seconds;
                progressFill.style.width = `${(5 - seconds) * 20}%`;
                if (seconds === 0) {
                    clearInterval(interval);
                    window.open(formMap[selectedName], "_blank");
                }
            }, 1000);

        } else {
            searchInput.value = "";
            nameConfirmSection.classList.add("hidden");
        }
    }

    function toggleOther(show) {
        if (show && otherDiet) {
            otherDiet.classList.remove("hidden");
        } else if (otherDiet) {
            otherDiet.classList.add("hidden");
        }
    }
</script>
</body>
</html>
